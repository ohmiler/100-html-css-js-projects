<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตาราง Bento — EP38</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="bento-grid" id="bentoGrid">
      <article class="bento-item" data-area="hero" tabindex="0">
        <span class="bento-label">ไฮไลต์</span>
        <h2>โปรเจกต์ใหม่</h2>
      </article>
      <article class="bento-item" data-area="stats" tabindex="0">
        <span class="bento-label">สถิติ</span>
        <h2>1,248 ผู้ใช้</h2>
      </article>
      <article class="bento-item" data-area="chart" tabindex="0">
        <span class="bento-label">กราฟ</span>
        <h2>ยอดขายรายสัปดาห์</h2>
      </article>
      <article class="bento-item" data-area="note" tabindex="0">
        <span class="bento-label">บันทึก</span>
        <h2>อัปเดต v2.4</h2>
      </article>
      <article class="bento-item" data-area="gallery" tabindex="0">
        <span class="bento-label">แกลเลอรี</span>
        <h2>12 ภาพใหม่</h2>
      </article>
      <article class="bento-item" data-area="cta" tabindex="0">
        <span class="bento-label">เริ่มต้น</span>
        <h2>สร้างโปรเจกต์</h2>
      </article>
      <article class="bento-item" data-area="team" tabindex="0">
        <span class="bento-label">ทีม</span>
        <h2>5 สมาชิกออนไลน์</h2>
      </article>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
