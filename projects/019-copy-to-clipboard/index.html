<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ปุ่ม Copy ข้อความ — EP19</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <!-- ข้อความที่จะคัดลอก -->
    <p id="copyText" class="copy-text">สวัสดีครับ ยินดีต้อนรับสู่โปรเจกต์ EP19!</p>
    <button id="copyBtn" class="copy-btn" type="button">คัดลอก</button>
    <!-- แสดงสถานะหลังคัดลอกสำเร็จ -->
    <p id="copyStatus" class="copy-status" aria-live="polite"></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
