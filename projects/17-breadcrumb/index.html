<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เส้นทางนำทาง — EP17</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>EP17: เส้นทางนำทาง (Breadcrumb)</h1>

    <!-- เส้นทางนำทาง -->
    <nav class="breadcrumb" aria-label="เส้นทางนำทาง">
      <ol class="breadcrumb-list">
        <li><button type="button" class="breadcrumb-link" data-page="home">หน้าแรก</button></li>
        <li><button type="button" class="breadcrumb-link" data-page="products">สินค้า</button></li>
        <li><button type="button" class="breadcrumb-link" data-page="electronics">อิเล็กทรอนิกส์</button></li>
        <!-- รายการสุดท้ายเป็นข้อความธรรมดา ไม่คลิกได้ -->
        <li><span class="breadcrumb-current" aria-current="page">โทรศัพท์</span></li>
      </ol>
    </nav>

    <!-- แสดงชื่อหน้าปัจจุบันเมื่อคลิก -->
    <p id="pageDisplay" class="page-display">หน้าปัจจุบัน: โทรศัพท์</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
