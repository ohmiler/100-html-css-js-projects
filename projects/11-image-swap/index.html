<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สลับรูปภาพ — EP11</title>
  <!-- เชื่อมไฟล์ CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>EP11: สลับรูปภาพ</h1>
    <p class="description">กดปุ่มเพื่อสลับระหว่างรูป 2 รูป</p>
    <!-- รูปภาพจาก picsum.photos — id ใช้เปลี่ยน src ใน JavaScript -->
    <img
      id="swapImage"
      class="swap-image"
      src="https://picsum.photos/seed/ep11a/400/300"
      alt="รูปภาพตัวอย่าง"
      width="400"
      height="300"
    >
    <button id="swapBtn" class="btn" type="button">สลับรูปภาพ</button>
  </main>
  <!-- โหลด JavaScript ท้าย body -->
  <script src="script.js"></script>
</body>
</html>
