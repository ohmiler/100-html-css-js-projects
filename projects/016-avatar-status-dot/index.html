<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อวตารและสถานะ — EP16</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <!-- อวตารพร้อมจุดสถานะ -->
    <div class="avatar-wrapper">
      <img
        id="avatarImage"
        class="avatar"
        src="https://picsum.photos/80/80"
        alt="รูปโปรไฟล์"
        width="80"
        height="80"
      >
      <span id="statusDot" class="status-dot status-online" aria-hidden="true"></span>
    </div>

    <p id="statusLabel" class="status-label">ออนไลน์</p>
    <button id="cycleBtn" class="btn" type="button">เปลี่ยนสถานะ</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
