<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo grid — EP32</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="gallery" id="gallery">
      <button class="gallery__item gallery__item--wide" type="button" data-index="0">
        <img src="https://picsum.photos/seed/ep32a/800/400" alt="ทิวทัศน์ภูเขา">
      </button>
      <button class="gallery__item" type="button" data-index="1">
        <img src="https://picsum.photos/seed/ep32b/400/400" alt="ป่าไม้เขียวขจี">
      </button>
      <button class="gallery__item" type="button" data-index="2">
        <img src="https://picsum.photos/seed/ep32c/400/400" alt="ชายหาดยามเย็น">
      </button>
      <button class="gallery__item" type="button" data-index="3">
        <img src="https://picsum.photos/seed/ep32d/400/400" alt="เมืองยามค่ำคืน">
      </button>
      <button class="gallery__item" type="button" data-index="4">
        <img src="https://picsum.photos/seed/ep32e/400/400" alt="ทุ่งดอกไม้">
      </button>
      <button class="gallery__item" type="button" data-index="5">
        <img src="https://picsum.photos/seed/ep32f/400/400" alt="ทะเลสาบเงียบสงบ">
      </button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
